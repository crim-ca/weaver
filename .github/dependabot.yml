# Dependabot configuration for automated dependency updates
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "12:00"
    # Automatically group all GitHub Actions updates into a single PR
    groups:
      github-actions:
        patterns:
          - "*"
    # Enable version updates with automatic rebasing
    open-pull-requests-limit: 5
    # Add reviewers and assignees
    reviewers:
      - "fmigneault"
    labels:
      - "dependencies"
      - "ci/operations"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Python dependencies (pip)
  # No grouping - each dependency gets its own PR
  # Minor/patch updates are auto-approved; major updates require manual review
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "13:00"
    open-pull-requests-limit: 10
    reviewers:
      - "fmigneault"
    labels:
      - "dependencies"
      - "ci/operations"
    commit-message:
      prefix: "deps"
      include: "scope"

  # Docker dependencies
  # No grouping for Docker dependencies - all updates need manual review
  # due to potential breaking changes in container environments
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "14:00"
    open-pull-requests-limit: 3
    reviewers:
      - "fmigneault"
    labels:
      - "dependencies"
      - "ci/operations"
      - "feature/docker"
    commit-message:
      prefix: "docker"
      include: "scope"

  # NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "15:00"
    groups:
      npm-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 3
    reviewers:
      - "fmigneault"
    labels:
      - "dependencies"
      - "ci/operations"
    commit-message:
      prefix: "deps"
      include: "scope"

